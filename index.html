<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO With Js Vanilla</title>
    <link rel="stylesheet" href="./src/style.css?v=5.0">
    <!-- Local font Manrope loaded via CSS -->
    <style>
        #debug-error {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999999;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            padding: 10px;
            font-size: 14px;
            display: none;
            width: 100%;
        }
    </style>
    <script>
        window.addEventListener('error', function(e) {
            var dbg = document.getElementById('debug-error');
            if(dbg) {
                dbg.style.display = 'block';
                dbg.innerHTML += e.message + ' at ' + e.filename + ':' + e.lineno + '<br>';
            }
        });
    </script>
</head>

<body>
    <div id="debug-error"></div>
    <app id="app">
        <!-- ^^In this div my app works -->
    </app>

    <noscript>
        <div class="noscript">
            <h1>
                <strong>TODO With Js Vanilla</strong> requiere JavaScript para funcionar.
            </h1>
            <h2>
                Por favor, active JavaScript en su navegador, o cambie a otro que tenga soporte.
            </h2>
        </div>
    </noscript>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="./src/main.js?v=5.0" type="module"></script>
</body>

</html>
